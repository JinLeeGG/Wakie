<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WakieAI — Add account (matches the app)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* Tokens are the app's (apps/mac/lib/theme.dart) — mirrors
     apps/mac/lib/widgets/add_account_modal.dart. */
  :root{
    --t1:#f3f4f7; --t2:#a9aeb8; --t3:#6a7080;
    --amber:#ffc465; --amber-deep:#f6b23c;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --sans:'Instrument Sans',system-ui,sans-serif;
    --hair:rgba(255,255,255,.09); --hair-2:rgba(255,255,255,.14);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:var(--sans);color:var(--t1);-webkit-font-smoothing:antialiased;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    /* desktop scene so the modal reads as an overlay, like in the app */
    background:
      radial-gradient(50% 45% at 12% 8%, rgba(56,140,160,.28), transparent 60%),
      radial-gradient(55% 50% at 92% 18%, rgba(150,110,235,.24), transparent 62%),
      radial-gradient(60% 55% at 70% 100%, rgba(255,170,70,.16), transparent 60%),
      linear-gradient(160deg,#0a0c12,#070810 60%,#05060b);
    background-attachment:fixed;padding:40px;
  }

  /* modal box — width 452, near-opaque #161820 @ .96 (0xF5) */
  .box{
    width:452px;position:relative;overflow:hidden;
    background:rgba(22,24,32,.96);
    border:1px solid var(--hair-2);border-radius:20px;
    box-shadow:0 40px 100px -10px rgba(0,0,0,.7);
    animation:box-in .28s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes box-in{from{opacity:0;transform:scale(.94) translateY(8px)}to{opacity:1;transform:none}}
  .box::before{content:"";position:absolute;inset:0 0 auto 0;height:120px;pointer-events:none;
    background:linear-gradient(180deg,rgba(255,255,255,.055),transparent)}

  header{display:flex;align-items:center;padding:20px 16px 16px 22px}
  header .logo{width:20px;height:20px;display:block;flex:none}
  header .title{font-size:19px;font-weight:600;color:var(--t1);margin-left:11px}
  header .x{margin-left:auto;width:37px;height:37px;display:grid;place-items:center;border-radius:9px;
    cursor:pointer;color:var(--t2);transition:color .15s,background .15s}
  header .x:hover{color:var(--t1);background:rgba(255,255,255,.05)}
  header .x svg{width:19px;height:19px;display:block}

  .body{padding:4px 22px 22px}
  .lab3{font-family:var(--mono);font-size:10.5px;font-weight:500;letter-spacing:.14em;color:var(--t3);
    text-transform:uppercase;padding:2px 2px 11px}
  .lab3.prov{padding-top:16px} .lab3.label{padding-top:20px}

  /* provider radio cards */
  .prov-row{display:flex;align-items:center;gap:13px;padding:12px 13px;border-radius:12px;
    border:1px solid var(--hair);background:rgba(255,255,255,.03);cursor:pointer;
    transition:background .15s,border-color .15s}
  .prov-row+.prov-row{margin-top:11px}
  .prov-row:hover{background:rgba(255,255,255,.055)}
  .prov-row.sel{background:rgba(255,196,101,.07);border-color:rgba(255,196,101,.45)}
  .badge{width:35px;height:35px;border-radius:11px;flex:none;display:grid;place-items:center;overflow:hidden}
  .badge img,.badge svg{width:22px;height:22px;display:block}
  .badge.claude{background:#d97757} .badge.codex{background:#edf1f7} .badge.anti{background:#1b1c21}
  .prov-row .nm{font-size:16px;font-weight:600;color:var(--t1)}
  .radio{margin-left:auto;width:18px;height:18px;border-radius:50%;flex:none;
    border:1.5px solid var(--hair-2);display:grid;place-items:center;transition:border-color .15s}
  .prov-row.sel .radio{border-color:var(--amber)}
  .radio i{width:9px;height:9px;border-radius:50%;background:var(--amber);transform:scale(0);
    transition:transform .15s cubic-bezier(.2,1.4,.4,1)}
  .prov-row.sel .radio i{transform:scale(1)}

  /* label field */
  /* label field — border stays neutral even when focused, matching the app */
  .field{padding:3px 14px;background:rgba(255,255,255,.03);border:1px solid var(--hair);border-radius:12px}
  .field input{width:100%;background:none;border:none;outline:none;color:var(--t1);
    font-family:var(--sans);font-size:15.5px;padding:10px 0;caret-color:var(--amber)}
  .field input::placeholder{color:var(--t3)}

  /* lock note */
  .info{display:flex;align-items:flex-start;gap:9px;padding:16px 2px 4px}
  .info .lock{font-size:13px;line-height:1.5;flex:none}
  .info p{font-size:13px;line-height:1.5;color:var(--t2)}
  .info b{color:var(--t1);font-weight:500}

  /* primary button */
  .cta{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;margin-top:26px;
    padding:14px;border-radius:13px;border:1px solid rgba(255,196,101,.6);
    background:var(--amber);color:#1a1205;font-family:var(--sans);font-size:16px;font-weight:700;
    cursor:pointer;transition:filter .14s,transform .12s}
  .cta:hover{filter:brightness(1.05);transform:translateY(-1px)}
  .cta svg{width:17px;height:17px;display:block}
</style>
</head>
<body>
  <div class="box">
    <header>
      <svg class="logo" viewBox="0 0 100 100"><circle cx="50" cy="50" r="38" fill="none" stroke="#fff" stroke-width="7"/><circle cx="50" cy="50" r="22" fill="#f6b23c"/></svg>
      <span class="title">Add account</span>
      <div class="x" onclick="history.length>1?history.back():location.href='dashboard-mockup.html'">
        <svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </div>
    </header>

    <div class="body">
      <div class="lab3 prov">Provider</div>

      <div class="prov-row sel" data-terminal="false">
        <div class="badge claude"><img src="https://cdn.simpleicons.org/claude/ffffff" alt=""></div>
        <span class="nm">Claude</span>
        <div class="radio"><i></i></div>
      </div>

      <div class="prov-row" data-terminal="false">
        <div class="badge codex"><svg viewBox="0 0 24 24" fill="#1b1c21" aria-hidden="true"><path d="M22.2819 9.8211a5.9847 5.9847 0 0 0-.5157-4.9108 6.0462 6.0462 0 0 0-6.5098-2.9A6.0651 6.0651 0 0 0 4.9807 4.1818a5.9847 5.9847 0 0 0-3.9977 2.9 6.0462 6.0462 0 0 0 .7427 7.0966 5.98 5.98 0 0 0 .511 4.9107 6.051 6.051 0 0 0 6.5146 2.9001A5.9847 5.9847 0 0 0 13.2599 24a6.0557 6.0557 0 0 0 5.7718-4.2058 5.9894 5.9894 0 0 0 3.9977-2.9001 6.0557 6.0557 0 0 0-.7475-7.0729zm-9.022 12.6081a4.4755 4.4755 0 0 1-2.8764-1.0408l.1419-.0804 4.7783-2.7582a.7948.7948 0 0 0 .3927-.6813v-6.7369l2.02 1.1686a.071.071 0 0 1 .038.052v5.5826a4.504 4.504 0 0 1-4.4945 4.4944zm-9.6607-4.1254a4.4708 4.4708 0 0 1-.5346-3.0137l.142.0852 4.783 2.7582a.7712.7712 0 0 0 .7806 0l5.8428-3.3685v2.3324a.0804.0804 0 0 1-.0332.0615L9.74 19.9502a4.4992 4.4992 0 0 1-6.1408-1.6464zM2.3408 7.8956a4.485 4.485 0 0 1 2.3655-1.9728V11.6a.7664.7664 0 0 0 .3879.6765l5.8144 3.3543-2.0201 1.1685a.0757.0757 0 0 1-.071 0l-4.8303-2.7865A4.504 4.504 0 0 1 2.3408 7.872zm16.5963 3.8558L13.1038 8.364 15.1192 7.2a.0757.0757 0 0 1 .071 0l4.8303 2.7913a4.4944 4.4944 0 0 1-.6765 8.1042v-5.6772a.79.79 0 0 0-.407-.667zm2.0107-3.0231l-.142-.0852-4.7735-2.7818a.7759.7759 0 0 0-.7854 0L9.409 9.2297V6.8974a.0662.0662 0 0 1 .0284-.0615l4.8303-2.7866a4.4992 4.4992 0 0 1 6.6802 4.66zM8.3065 12.863l-2.02-1.1638a.0804.0804 0 0 1-.038-.0567V6.0742a4.4992 4.4992 0 0 1 7.3757-3.4537l-.142.0805L8.704 5.459a.7948.7948 0 0 0-.3927.6813zm1.0976-2.3654l2.602-1.4998 2.6069 1.4998v2.9994l-2.5974 1.4997-2.6067-1.4997Z"/></svg></div>
        <span class="nm">Codex</span>
        <div class="radio"><i></i></div>
      </div>

      <div class="prov-row" data-terminal="true">
        <div class="badge anti">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <defs><linearGradient id="agy" x1="4" y1="20" x2="20" y2="4" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#3aa0ff"/><stop offset=".5" stop-color="#a77bff"/><stop offset="1" stop-color="#ff9e5e"/>
            </linearGradient></defs>
            <path d="M12 3.6L4.6 20.4M12 3.6l7.4 16.8M8.1 14.2h7.8" fill="none" stroke="url(#agy)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="nm">Antigravity</span>
        <div class="radio"><i></i></div>
      </div>

      <div class="lab3 label">Label</div>
      <div class="field"><input type="text" placeholder="e.g. Personal, Work, main" autofocus></div>

      <div class="info">
        <span class="lock">🔒</span>
        <p>Sign-in completes in <b id="where">your browser on this Mac</b>. Each account gets an <b>isolated slot</b>, and credentials stay on this Mac only.</p>
      </div>

      <button class="cta"><span id="cta-label">Sign in with browser</span>
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h13M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

<script>
  // provider selection — Claude/Codex sign in via browser, Antigravity via Terminal
  // (add_account_modal.dart: _viaTerminal = provider == anti)
  const rows = document.querySelectorAll('.prov-row');
  const where = document.getElementById('where');
  const ctaLabel = document.getElementById('cta-label');
  rows.forEach(row => row.addEventListener('click', () => {
    rows.forEach(r => r.classList.remove('sel'));
    row.classList.add('sel');
    const viaTerminal = row.dataset.terminal === 'true';
    where.textContent = (viaTerminal ? 'Terminal' : 'your browser') + ' on this Mac';
    ctaLabel.textContent = 'Sign in with ' + (viaTerminal ? 'Terminal' : 'browser');
  }));
</script>
</body>
</html>
