<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --amber:#ffc465;--ok:#5fd39a;
    --t1:#f3f4f7;--t2:#a9aeb8;--t3:#6a7080;
    --hair:rgba(255,255,255,.09);--hair2:rgba(255,255,255,.15);
    --glass:rgba(22,24,32,.55);
    --mono:'JetBrains Mono',monospace;--sans:'Instrument Sans',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    display:grid;place-items:center;overflow:hidden;font-family:var(--sans);
    color:var(--t1);-webkit-font-smoothing:antialiased;
    background:
      radial-gradient(50% 45% at 12% 8%,  rgba(56,140,160,.30),  transparent 60%),
      radial-gradient(55% 50% at 92% 18%, rgba(150,110,235,.26), transparent 62%),
      radial-gradient(60% 55% at 70% 100%,rgba(255,170,70,.18),  transparent 60%),
      radial-gradient(50% 50% at 30% 90%, rgba(60,90,200,.20),   transparent 60%),
      linear-gradient(160deg,#0a0c12,#070810 60%,#05060b);
  }

  .window{
    position:relative;width:452px;height:660px;border-radius:20px;overflow:hidden;
    border:1px solid var(--hair2);
    background:var(--glass);
    -webkit-backdrop-filter:blur(60px) saturate(180%);
    backdrop-filter:blur(60px) saturate(180%);
    box-shadow:0 40px 100px -24px rgba(0,0,0,.7),0 8px 30px -10px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.14);
    display:flex;flex-direction:column;padding:32px 28px 28px;
  }

  .window::before{content:"";position:absolute;inset:0 0 auto 0;height:120px;background:linear-gradient(180deg,rgba(255,255,255,.055),transparent);pointer-events:none;z-index:0}

  /* ── header ── */
  .hd{display:flex;align-items:center;gap:10px;margin-bottom:32px;position:relative;z-index:1;animation:rise .5s both}
  .back-btn{color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;
    padding:10px;margin:-10px;flex:none;background:none;border:none;
    transition:color .12s}
  .back-btn:hover{color:var(--t1)}
  .back-btn:active{transform:scale(.88);transition-duration:.06s}
  .back-btn svg{width:16px;height:16px;display:block}
  .logo-sm{display:flex;align-items:center;gap:8px}
  .logo-sm svg{width:22px;height:22px}
  .logo-sm span{font-family:var(--mono);font-size:14px;font-weight:700;letter-spacing:.01em}
  .logo-sm span b{color:var(--amber)}

  /* ── scan header ── */
  .scan-hd{position:relative;z-index:1;margin-bottom:24px;animation:rise .5s .08s both}
  .scan-label{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.16em;
    color:var(--ok);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:8px}
  .scan-label::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--ok);
    box-shadow:0 0 6px 2px rgba(95,211,154,.4);animation:blink 1.8s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
  .scan-title{font-size:22px;font-weight:700;letter-spacing:-.01em;line-height:1.2}
  .scan-sub{font-size:15px;color:var(--t2);margin-top:6px;line-height:1.45}

  /* ── account list ── */
  .accounts{display:flex;flex-direction:column;gap:11px;flex:1;position:relative;z-index:1}

  .row{
    display:flex;align-items:center;gap:12px;
    padding:12px 14px;border-radius:12px;
    border:1px solid var(--hair);
    background:rgba(255,255,255,.03);
    cursor:pointer;
    transition:background .15s,border-color .15s;
    position:relative;overflow:hidden;
  }
  .row.selected{border-color:rgba(255,196,101,.45);background:rgba(255,196,101,.07)}
  .row:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.16)}

  /* staggered entry */
  .row:nth-child(1){animation:rise .45s .18s both}
  .row:nth-child(2){animation:rise .45s .26s both}
  .row:nth-child(3){animation:rise .45s .34s both}
  .row:nth-child(4){animation:rise .45s .42s both}

  /* provider icon — matches dashboard .badge */
  .icon{width:35px;height:35px;border-radius:11px;flex-shrink:0;display:grid;place-items:center}
  .icon img,.icon svg{width:20px;height:20px;display:block}
  .icon.claude{background:rgba(217,119,87,.16)}
  .icon.codex{background:rgba(255,255,255,.08)}
  .icon.agy{background:rgba(120,150,240,.15)}

  .info{flex:1;min-width:0}
  .info .name{font-size:14.5px;font-weight:600;letter-spacing:.005em}
  .info .meta{font-family:var(--mono);font-size:10.5px;color:var(--t3);margin-top:2px;letter-spacing:.04em}
  .info .meta b{color:var(--t2);font-weight:400}

  /* check */
  .chk{width:22px;height:22px;border-radius:6px;border:1.5px solid rgba(255,255,255,.2);
    flex-shrink:0;display:grid;place-items:center;transition:background .15s,border-color .15s}
  .row.selected .chk{background:var(--amber);border-color:var(--amber)}
  .chk svg{width:11px;height:11px;opacity:0;transition:opacity .12s}
  .row.selected .chk svg{opacity:1}

  /* select all */
  .sel-all{display:flex;align-items:center;justify-content:space-between;
    font-family:var(--mono);font-size:10.5px;color:var(--t3);letter-spacing:.06em;
    padding:0 2px;margin-bottom:10px;position:relative;z-index:1;animation:rise .5s .14s both}
  .sel-all button{color:var(--t2);background:none;border:none;cursor:pointer;font:inherit;font-size:10.5px;
    letter-spacing:.06em;transition:color .15s}
  .sel-all button:hover{color:var(--t1)}

  /* ── footer ── */
  .foot{position:relative;z-index:1;margin-top:28px;display:flex;flex-direction:column;gap:9px;animation:rise .5s .50s both}
  .btn-primary{
    display:flex;align-items:center;justify-content:center;gap:8px;
    padding:13px;border-radius:12px;
    background:var(--amber);color:#0a0c12;
    font-family:var(--sans);font-size:14px;font-weight:700;
    border:none;cursor:pointer;letter-spacing:.01em;
    transition:opacity .15s,transform .12s,box-shadow .15s;
    box-shadow:0 2px 10px -4px rgba(246,178,60,.18);
  }
  .btn-primary:hover{opacity:.92;transform:translateY(-1px);box-shadow:0 4px 16px -6px rgba(246,178,60,.28)}
  .btn-primary:active{transform:translateY(0);transition-duration:.06s}
  .btn-primary svg{width:15px;height:15px}
  .btn-secondary{
    display:flex;align-items:center;justify-content:center;gap:7px;
    padding:11px;border-radius:12px;
    border:1px solid var(--hair2);background:transparent;
    color:var(--t2);font-family:var(--sans);font-size:13px;font-weight:500;
    cursor:pointer;transition:background .15s,border-color .15s,color .15s;
  }
  .btn-secondary:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.22);color:var(--t1)}

  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
</style></head>
<body>
<div class="window">
  <!-- header -->
  <div class="hd">
    <button class="back-btn" aria-label="Back">
      <svg viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="logo-sm">
      <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="38" fill="none" stroke="#fff" stroke-width="6"/><circle cx="50" cy="50" r="22" fill="#f6b23c"/></svg>
      <span><b>Wakie</b>AI</span>
    </div>
  </div>

  <!-- scan status -->
  <div class="scan-hd">
    <div class="scan-title">Found 4 accounts</div>
    <div class="scan-sub">These AI accounts are already signed in on this Mac.</div>
  </div>

  <!-- select all -->
  <div class="sel-all">
    <span>4 SELECTED</span>
    <button onclick="toggleAll(this)">Deselect all</button>
  </div>

  <!-- account rows -->
  <div class="accounts" id="list">

    <div class="row selected" onclick="toggle(this)">
      <div class="icon claude">
        <img src="https://cdn.simpleicons.org/anthropic/d98b6a" alt="Claude">
      </div>
      <div class="info">
        <div class="name">Claude · Personal</div>
        <div class="meta">claude · <b>pro</b></div>
      </div>
      <div class="chk"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#0a0c12" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>

    <div class="row selected" onclick="toggle(this)">
      <div class="icon claude">
        <img src="https://cdn.simpleicons.org/anthropic/d98b6a" alt="Claude">
      </div>
      <div class="info">
        <div class="name">Claude · Work</div>
        <div class="meta">claude · <b>max</b></div>
      </div>
      <div class="chk"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#0a0c12" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>

    <div class="row selected" onclick="toggle(this)">
      <div class="icon codex">
        <svg viewBox="0 0 24 24" fill="#e9ebee"><path d="M22.2819 9.8211a5.9847 5.9847 0 0 0-.5157-4.9108 6.0462 6.0462 0 0 0-6.5098-2.9A6.0651 6.0651 0 0 0 4.9807 4.1818a5.9847 5.9847 0 0 0-3.9977 2.9 6.0462 6.0462 0 0 0 .7427 7.0966 5.98 5.98 0 0 0 .511 4.9107 6.051 6.051 0 0 0 6.5146 2.9001A5.9847 5.9847 0 0 0 13.2599 24a6.0557 6.0557 0 0 0 5.7718-4.2058 5.9894 5.9894 0 0 0 3.9977-2.9001 6.0557 6.0557 0 0 0-.7475-7.0729zm-9.022 12.6081a4.4755 4.4755 0 0 1-2.8764-1.0408l.1419-.0804 4.7783-2.7582a.7948.7948 0 0 0 .3927-.6813v-6.7369l2.02 1.1686a.071.071 0 0 1 .038.052v5.5826a4.504 4.504 0 0 1-4.4945 4.4944zm-9.6607-4.1254a4.4708 4.4708 0 0 1-.5346-3.0137l.142.0852 4.783 2.7582a.7712.7712 0 0 0 .7806 0l5.8428-3.3685v2.3324a.0804.0804 0 0 1-.0332.0615L9.74 19.9502a4.4992 4.4992 0 0 1-6.1408-1.6464zM2.3408 7.8956a4.485 4.485 0 0 1 2.3655-1.9728V11.6a.7664.7664 0 0 0 .3879.6765l5.8144 3.3543-2.0201 1.1685a.0757.0757 0 0 1-.071 0l-4.8303-2.7865A4.504 4.504 0 0 1 2.3408 7.872zm16.5963 3.8558L13.1038 8.364 15.1192 7.2a.0757.0757 0 0 1 .071 0l4.8303 2.7913a4.4944 4.4944 0 0 1-.6765 8.1042v-5.6772a.79.79 0 0 0-.407-.667zm2.0107-3.0231l-.142-.0852-4.7735-2.7818a.7759.7759 0 0 0-.7854 0L9.409 9.2297V6.8974a.0662.0662 0 0 1 .0284-.0615l4.8303-2.7866a4.4992 4.4992 0 0 1 6.6802 4.66zM8.3065 12.863l-2.02-1.1638a.0804.0804 0 0 1-.038-.0567V6.0742a4.4992 4.4992 0 0 1 7.3757-3.4537l-.142.0805L8.704 5.459a.7948.7948 0 0 0-.3927.6813zm1.0976-2.3654l2.602-1.4998 2.6069 1.4998v2.9994l-2.5974 1.4997-2.6067-1.4997Z"/></svg>
      </div>
      <div class="info">
        <div class="name">Codex · main</div>
        <div class="meta">chatgpt · <b>plus</b></div>
      </div>
      <div class="chk"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#0a0c12" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>

    <div class="row selected" onclick="toggle(this)">
      <div class="icon agy">
        <img src="https://cdn.simpleicons.org/googlegemini/8ab0ff" alt="Antigravity">
      </div>
      <div class="info">
        <div class="name">Antigravity · main</div>
        <div class="meta">gemini · <b>plan</b></div>
      </div>
      <div class="chk"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#0a0c12" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>

  </div>

  <!-- footer -->
  <div class="foot">
    <button class="btn-primary" id="cont-btn" onclick="location.href='onboarding-step3.html'">
      <span id="cont-label">Continue with 4 accounts</span>
      <svg viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="#0a0c12" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="btn-secondary" onclick="location.href='add-account.html'">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      Add account manually
    </button>
  </div>
</div>

<script>
  function toggle(row) {
    row.classList.toggle('selected');
    update();
  }
  function toggleAll(btn) {
    const rows = document.querySelectorAll('.row');
    const anySelected = [...rows].some(r => r.classList.contains('selected'));
    rows.forEach(r => anySelected ? r.classList.remove('selected') : r.classList.add('selected'));
    update();
  }
  function update() {
    const rows = document.querySelectorAll('.row');
    const n = [...rows].filter(r => r.classList.contains('selected')).length;
    const selEl = document.querySelector('.sel-all span');
    const btnEl = document.querySelector('.sel-all button');
    const contEl = document.getElementById('cont-label');
    const contBtn = document.getElementById('cont-btn');
    selEl.textContent = n + ' SELECTED';
    btnEl.textContent = n === rows.length ? 'Deselect all' : 'Select all';
    contEl.textContent = n > 0 ? `Continue with ${n} account${n>1?'s':''}` : 'Skip for now';
    contBtn.style.opacity = n === 0 ? '.5' : '1';
  }
</script>
</body></html>
