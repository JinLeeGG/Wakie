<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="WakieAI app icon">
  <!-- WakieAI app icon — navy tile · white orbit ring · amber core (works on any background) -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2250"/>
      <stop offset="1" stop-color="#0c1030"/>
    </linearGradient>
    <radialGradient id="core" cx="38%" cy="30%" r="72%">
      <stop offset="0" stop-color="#ffe1a3"/>
      <stop offset="0.55" stop-color="#f6b23c"/>
      <stop offset="1" stop-color="#d1892a"/>
    </radialGradient>
  </defs>
  <rect x="6" y="6" width="88" height="88" rx="23" fill="url(#tile)"/>
  <circle cx="50" cy="50" r="26" fill="none" stroke="#ffffff" stroke-width="5"/>
  <circle cx="50" cy="50" r="15" fill="url(#core)"/>
</svg>
