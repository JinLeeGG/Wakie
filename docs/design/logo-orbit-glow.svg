<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" role="img" aria-label="WakieAI">
  <!-- WakieAI orbit mark v2 (2026-07-04, from the landing page) -->
  <!-- Tilted orbit ring + amber core with soft glow. For dark backgrounds. -->
  <defs>
    <filter id="core-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  <ellipse cx="12" cy="12" rx="10.5" ry="5"
           stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.3"
           transform="rotate(-24 12 12)"/>
  <circle cx="12" cy="12" r="4.4" fill="#ffc465" opacity="0.5" filter="url(#core-glow)"/>
  <circle cx="12" cy="12" r="4.4" fill="#ffc465"/>
</svg>
